# ============================================================================
# Docker Compose - הגדרת כל שירותי האפליקציה
# ============================================================================
# שירותים:
#   db-1:     PostgreSQL 15 - בסיס הנתונים
#   api:      FastAPI backend (פורט 8000)
#   frontend: React/Vite frontend (פורט 5173)
#
# משתני סביבה נלקחים מקובץ .env
# ============================================================================

services:
  # --- בסיס נתונים PostgreSQL ---
  db-1:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - data1:/var/lib/postgresql/data
      - ./backup.sql:/docker-entrypoint-initdb.d/01_restore.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- שרת ה-API (FastAPI) ---
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile.backend
    container_name: fastapi_app
    restart: on-failure
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    depends_on:
      db-1:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      RESET_DB: ${RESET_DB}
      USE_ALEMBIC: ${USE_ALEMBIC:-1}
      POSTGRES_HOST: db-1
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      TZ: Asia/Jerusalem

  # --- שרת ה-Frontend (React + Vite) ---
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: meetings_frontend
    command: sh -c "[ -d node_modules/react ] || npm install --legacy-peer-deps; npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  data1:
  frontend_node_modules:
