services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Eden770
      POSTGRES_DB: fastapi_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_demo -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./project-avnet-main
      dockerfile: Dockerfile.backend
    container_name: fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./project-avnet-main:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: Eden770
       POSTGRES_DB: fastapi_demo
       POSTGRES_HOST: db

  frontend:
    build:
      context: ./Meetings-App
      dockerfile: Dockerfile
    container_name: meetings_frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./Meetings-App/src:/app/src

volumes:
  postgres_data: