name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest

    # 1. הוספת שירות Postgres ייעודי לזמן הבדיקות
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123 # סיסמה זמנית לבדיקות
          POSTGRES_DB: fastapi_demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (incremental scope)
        run: ruff check tests

      - name: Pytest
        env:
          PYTHONPATH: .
          # 2. עדכון משתני הסביבה שיתאימו לשירות שהרמנו למעלה
          JWT_SECRET: test_secret_for_ci
          JWT_ALGORITHM: HS256
          SUPER_ADMIN_USERNAME: superadmin
          SUPER_ADMIN_PASSWORD: superadminpassword
          POSTGRES_HOST: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: fastapi_demo
          POSTGRES_PORT: 5432
          RESET_DB: 1
        run: pytest -v
